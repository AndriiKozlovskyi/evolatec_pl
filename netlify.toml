[build]
command = "npm run generate"
publish = ".output/public"

[build.environment]
NODE_VERSION = "20.19.0"
NPM_VERSION = "10"
NITRO_PRESET = "static"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOW-FROM https://storyblok.com"
    Content-Security-Policy = "frame-ancestors 'self' https://app.storyblok.com https://storyblok.com;"
